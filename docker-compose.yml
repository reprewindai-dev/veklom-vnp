services:
  veklom-vnp-standalone:
    build: 
      context: .
      dockerfile: Dockerfile
    image: veklom-vnp-standalone:latest
    container_name: veklom-vnp-standalone-node
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      # Connect to the existing Postgres database running in the Coolify network
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be configured}
      VNP_ENV: production
      BYOS_BACKEND_URL: https://api.veklom.com
      VNP_CORS_ALLOW_ORIGINS: https://veklom.com,https://www.veklom.com,https://vnp.veklom.com,https://control.veklom.com,https://veklom.dev
    labels:
      - traefik.enable=true
      - traefik.http.routers.vnp-standalone-http.entrypoints=http
      - traefik.http.routers.vnp-standalone-http.rule=Host(`vnp.veklom.com`) && PathPrefix(`/`)
      - traefik.http.routers.vnp-standalone-https.entrypoints=https
      - traefik.http.routers.vnp-standalone-https.rule=Host(`vnp.veklom.com`) && PathPrefix(`/`)
      - traefik.http.routers.vnp-standalone-https.tls=true
      - traefik.http.routers.vnp-standalone-https.tls.certresolver=letsencrypt
      - traefik.http.services.vnp-standalone.loadbalancer.server.port=8089
    networks:
      - coolify

networks:
  coolify:
    external: True
